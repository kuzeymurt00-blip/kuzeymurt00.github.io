<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linor Search Engine</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #060608;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-wrapper {
            width: 100%;
            max-width: 650px;
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(45deg, #00ffaa, #00bcff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: -2px;
        }

        .search-box {
            display: flex;
            background: #111116;
            padding: 6px;
            border-radius: 40px;
            border: 1px solid #1f1f2e;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        input {
            flex: 1;
            padding: 12px 25px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            outline: none;
        }

        button {
            padding: 12px 35px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg, #00ffaa, #00bcff);
            color: #060608;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.4);
        }

        #status {
            color: #4a4a6a;
            font-size: 14px;
            margin-top: 15px;
        }

        /* TERTEMİZ TASARLANAN SONUÇ KARTLARI */
        #results {
            width: 100%;
            max-width: 750px;
            text-align: left;
        }

        .result-card {
            background: #111116;
            padding: 22px;
            border-radius: 14px;
            margin-bottom: 25px;
            border: 1px solid #1f1f2e;
            transition: 0.2s ease;
        }

        .result-card:hover {
            border-color: #00ffaa;
            background: #14141f;
        }

        .result-card a {
            color: #00ffaa;
            font-size: 22px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 5px;
        }

        .result-card a:hover {
            text-decoration: underline;
        }

        .result-url {
            color: #00bcff;
            font-size: 13px;
            margin-bottom: 10px;
            word-break: break-all;
        }

        .result-desc {
            color: #a0a0b0;
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="search-wrapper">
        <h1>LINOR</h1>
        <div class="search-box">
            <input type="text" id="query" placeholder="Sıfır logolu, tamamen özgür arama..." onkeypress="if(event.key === 'Enter') linorMasaustuAra()">
            <button onclick="linorMasaustuAra()">Ara</button>
        </div>
        <p id="status"></p>
    </div>

    <div id="results"></div>

<script>
async function linorMasaustuAra() {
    const query = document.getElementById('query').value.trim();
    const resultsDiv = document.getElementById('results');
    const statusDiv = document.getElementById('status');
    
    if (!query) return;

    resultsDiv.innerHTML = "";
    statusDiv.innerHTML = "Linor fütüristik sunucuları interneti tarıyor...";

    // ⚠️ BURAYI VERCEL'İN SANA VERDİĞİ GERÇEK KENDİ URL ADRESİNLE DEĞİŞTİRECEKSİN!
    const vercelSunucuUrl = `https://vercel.app{encodeURIComponent(query)}`;

    try {
        // Doğrudan kendi sunucumuza istek atıyoruz (CORS koruması aşılmıştır)
        const response = await fetch(vercelSunucuUrl);
        const data = await response.json();

        if (data.results && data.results.length > 0) {
            statusDiv.innerHTML = `✔ ${data.results.length} gerçek sonuç listelendi.`;
            let htmlOutput = "";

            data.results.forEach(item => {
                htmlOutput += `
                    <div class="result-card">
                        <a href="${item.url}" target="_blank">${item.title}</a>
                        <div class="result-url">${item.url}</div>
                        <div class="result-desc">${item.snippet}</div>
                    </div>`;
            });

            resultsDiv.innerHTML = htmlOutput;
        } else {
            statusDiv.innerHTML = "";
            resultsDiv.innerHTML = "<p style='color:#ff5252; text-align:center;'>Arama sonucu bulunamadı.</p>";
        }

    } catch (error) {
        console.error("Bağlantı Hatası:", error);
        statusDiv.innerHTML = "<p style='color:#ff5252;'>Vercel sunucu bağlantısı zaman aşımına uğradı.</p>";
    }
}
</script>

</body>
</html>
